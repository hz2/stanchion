name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: cache nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: clippy (deny warnings)
        run: nix develop --command cargo clippy --all-targets --all-features -- -D warnings

      - name: unit + integration tests
        run: nix develop --command cargo test

      - name: doc tests
        run: nix develop --command cargo test --doc

  kani:
    name: kani proofs
    runs-on: ubuntu-latest
    # kani proofs run on the pinned nightly devShell
    steps:
      - uses: actions/checkout@v4

      - name: install nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: cache nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-kani-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            nix-kani-${{ runner.os }}-

      - name: install cargo-kani
        run: nix develop .#kani --command cargo install --locked cargo-kani

      - name: run kani proofs
        run: nix develop .#kani --command cargo kani --harness xor_back_edge_pairing
        # additional harnesses can be added here as coverage grows

  bench-check:
    name: benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: check benchmarks compile
        run: nix develop --command cargo bench --no-run
